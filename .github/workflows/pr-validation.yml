name: CI Validation (MUSA GPU)

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target branch to check rebase against (for manual run)'
        required: false
        default: 'main'
        type: string
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  validate:
    runs-on: [self-hosted, musa-gpu]

    env:
      CONTAINER: Runner
      COMMIT_ID: ${{ github.event.pull_request.head.sha || github.sha }}
      LOG_BASE: /workspace/ci_logs
      WORKSPACE: /workspace/action-runner/_work/${{ github.event.repository.name }}/${{ github.event.repository.name }}

    steps:
      # ==============================
      # Checkout
      # ==============================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_ID }}

      # - name: Checkout code
      #   run: |
      #     echo "Updating existing repository..."
      #     # 确保目录存在且是个 git 仓库
      #     mkdir -p . && git init        
      #     # 添加远程仓库（如果不存在）
      #     git remote add origin https://github.com/${{ github.repository }}.git || true         
      #     # 只抓取当前 PR 和目标分支，不拉取其他无关分支
      #     git fetch origin ${{ env.COMMIT_ID }} --depth=50
      #     git fetch origin ${{ github.base_ref || 'main' }} --depth=50
      #     # 强制重置到目标 Commit
      #     git checkout -f ${{ env.COMMIT_ID }}
      #     git clean -xfd # 清理未追踪的垃圾文件

      # ==============================
      # 检查容器
      # ==============================
      - name: Check container status
        run: |
          docker ps --format '{{.Names}}' | grep -w "$CONTAINER" || {
            echo "❌ Container $CONTAINER not running"
            exit 1
          }

      # ==============================
      # 创建日志目录
      # ==============================
      - name: Prepare log directory
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            TYPE="pr"
            ID="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" == "schedule" ]; then
            TYPE="daily"
            ID=$(date +%F)
          else
            TYPE="manual"
            ID="${{ github.run_id }}"
          fi

          LOG_DIR="$LOG_BASE/$TYPE/$ID"

          docker exec "$CONTAINER" mkdir -p "$LOG_DIR"

          echo "LOG_DIR=$LOG_DIR" >> $GITHUB_ENV
          echo "TYPE=$TYPE" >> $GITHUB_ENV

          echo "✅ Log dir: $LOG_DIR"

      # ==============================
      # Rebase 检查（仅 PR）
      # ==============================
      - name: Check Rebase Status
        if: github.event_name == 'pull_request'
        run: |
          TARGET_BRANCH="${{ github.base_ref }}"
          git fetch origin $TARGET_BRANCH

          if ! git merge-base --is-ancestor origin/$TARGET_BRANCH HEAD; then
            echo "❌ NOT rebased"
            exit 1
          fi

      # ==============================
      # Format
      # ==============================
      - name: Check code formatting
        id: run-format
        run: |
          set +e # 关闭遇到错误立即退出的默认行为

          exit_code=0
          docker exec $CONTAINER bash -c "
            set -o pipefail
            source /root/miniconda/etc/profile.d/conda.sh && conda activate runner &&
            cd $WORKSPACE &&
            LOG_FILE='$LOG_DIR/format.log' &&
            find . \( -path ./build -o -path ./.git \) -prune -o \
            -regex '.*\.\(cpp\|hpp\|c\|h\|cu\)' -print0 |
            xargs -0 clang-format --Werror --dry-run > \$LOG_FILE 2>&1
          " || exit_code=$?

          if [ $exit_code -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
        continue-on-error: true

      # ==============================
      # Build
      # ==============================
      - name: Build
        id: run-build
        run: |
          set +e 

          exit_code=0
          docker exec $CONTAINER bash -c "
            source /root/miniconda/etc/profile.d/conda.sh && conda activate runner &&
            cd $WORKSPACE &&
            LOG_FILE='$LOG_DIR/build.log' &&
            rm -rf ./build &&
            ./build.sh > \$LOG_FILE 2>&1
          " || exit_code=$?

          if [ $exit_code -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
        continue-on-error: true

      # ==============================
      # Test
      # ==============================
      - name: Integration Test
        id: run-integration
        run: |
          set +e

          exit_code=0
          docker exec $CONTAINER bash -c "
            source /root/miniconda/etc/profile.d/conda.sh && conda activate runner &&
            cd $WORKSPACE/test &&
            LOG_FILE='$LOG_DIR/test.log' &&
            timeout 30m python test_runner.py > \$LOG_FILE 2>&1
          " || exit_code=$?

          if [ $exit_code -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
        continue-on-error: true

      # ==============================
      # Summary（写入日志目录）
      # ==============================
      - name: Save Summary
        if: always()
        run: |
          docker exec $CONTAINER bash -c "
            source /root/miniconda/etc/profile.d/conda.sh && conda activate runner &&
            SUMMARY='$LOG_DIR/summary.md'
            echo '# CI Report - $COMMIT_ID' > \$SUMMARY
            echo '- Format: ${{ steps.run-format.outputs.status || 'skipped' }}' >> \$SUMMARY
            echo '- Build: ${{ steps.run-build.outputs.status || 'skipped' }}' >> \$SUMMARY
            echo '- Test: ${{ steps.run-integration.outputs.status || 'skipped' }}' >> \$SUMMARY
          "

      # ==============================
      # CI Summary（GitHub UI）
      # ==============================
      - name: CI Summary
        if: always()
        run: |
          echo "## CI Result" >> $GITHUB_STEP_SUMMARY
          echo "Commit: $COMMIT_ID" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Format | ${{ steps.run-format.outputs.status || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.run-build.outputs.status || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ steps.run-integration.outputs.status || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.run-format.outputs.status }}" == "failure" ] || \
             [ "${{ steps.run-build.outputs.status }}" == "failure" ] || \
             [ "${{ steps.run-integration.outputs.status }}" == "failure" ]; then
            exit 1
          fi