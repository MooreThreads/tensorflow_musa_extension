name: CI Validation (MUSA GPU)

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Target branch to check rebase against (for manual run)"
        required: false
        default: "main"
        type: string
      commit_sha:
        description: "Optional commit SHA to test instead of the workflow SHA"
        required: false
        default: ""
        type: string
      baseline_sha:
        description: "Optional baseline commit SHA; leave empty to use latest upstream/main"
        required: false
        default: ""
        type: string
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  COMMIT_ID: ${{ github.event.pull_request.head.sha || github.sha }}
  LOG_BASE: /home/runner/ci_logs
  MODEL_ROOT: /home/runner/tf_test_model-master
  BASELINE_WORKSPACE: /home/runner/baseline/tensorflow_musa_extension
  BASELINE_REPO_URL: https://github.com/MooreThreads/tensorflow_musa_extension.git
  CURRENT_PLUGIN_ARTIFACT: current-plugin
  BASELINE_PLUGIN_ARTIFACT: baseline-plugin

jobs:
  prepare_metadata:
    name: Prepare Metadata
    runs-on: [self-hosted, musa-gpu]
    outputs:
      commit_id: ${{ steps.collect.outputs.commit_id }}
      requested_commit_id: ${{ steps.collect.outputs.requested_commit_id }}
      requested_baseline_id: ${{ steps.collect.outputs.requested_baseline_id }}
      run_kind: ${{ steps.collect.outputs.run_kind }}
      run_id: ${{ steps.collect.outputs.run_id }}
      log_root: ${{ steps.collect.outputs.log_root }}
      summary_file: ${{ steps.collect.outputs.summary_file }}
    steps:
      - name: Prepare metadata
        id: collect
        run: |
          set -euo pipefail

          REQUESTED_COMMIT_ID="${{ github.event.inputs.commit_sha || '' }}"
          REQUESTED_BASELINE_ID="${{ github.event.inputs.baseline_sha || '' }}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            RUN_KIND="pr"
            RUN_ID="${{ github.event.pull_request.head.sha }}"
            EFFECTIVE_COMMIT_ID="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            RUN_KIND="daily"
            RUN_ID="$(date +%F)"
            EFFECTIVE_COMMIT_ID="${{ github.sha }}"
          else
            RUN_KIND="manual"
            EFFECTIVE_COMMIT_ID="${REQUESTED_COMMIT_ID:-${{ github.sha }}}"
            if [[ -n "$REQUESTED_COMMIT_ID" ]]; then
              RUN_ID="$REQUESTED_COMMIT_ID"
            else
              RUN_ID="${{ github.run_id }}"
            fi
          fi

          LOG_ROOT="$LOG_BASE/$RUN_KIND/$RUN_ID"
          JOB_LOG_DIR="$LOG_ROOT/prepare-metadata"
          SUMMARY_FILE="$RUNNER_TEMP/prepare-metadata.md"

          mkdir -p "$JOB_LOG_DIR"

          {
            echo "## Prepare Metadata"
            echo
            echo "- Commit: $EFFECTIVE_COMMIT_ID"
            echo "- Requested commit override: ${REQUESTED_COMMIT_ID:-none}"
            echo "- Requested baseline override: ${REQUESTED_BASELINE_ID:-none}"
            echo "- Run kind: $RUN_KIND"
            echo "- Run id: $RUN_ID"
            echo "- Log root: $LOG_ROOT"
            echo "- Runner: $(hostname)"
          } | tee "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

          echo "commit_id=$EFFECTIVE_COMMIT_ID" >> "$GITHUB_OUTPUT"
          echo "requested_commit_id=$REQUESTED_COMMIT_ID" >> "$GITHUB_OUTPUT"
          echo "requested_baseline_id=$REQUESTED_BASELINE_ID" >> "$GITHUB_OUTPUT"
          echo "run_kind=$RUN_KIND" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "log_root=$LOG_ROOT" >> "$GITHUB_OUTPUT"
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: summary-prepare-metadata
          path: ${{ steps.collect.outputs.summary_file }}
          if-no-files-found: error
          retention-days: 7

  format:
    name: Format Check
    needs: prepare_metadata
    runs-on: [self-hosted, musa-gpu]
    outputs:
      status: ${{ steps.collect.outputs.status }}
      summary_file: ${{ steps.collect.outputs.summary_file }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare_metadata.outputs.commit_id }}

      - name: Run format check
        id: run_check
        run: |
          set +e

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/format"
          LOG_FILE="$JOB_LOG_DIR/format_check.log"
          mkdir -p "$JOB_LOG_DIR"

          format_exit=0
          export JOB_LOG_DIR LOG_FILE
          bash -l -c '
            set -o pipefail
            cd "$GITHUB_WORKSPACE"
            FILE_LIST=$(mktemp)
            find . \( -path ./build -o -path ./.git \) -prune -o \
              -regex ".*\.\(cc\|cpp\|hpp\|c\|h\|cu\)" -print0 > "$FILE_LIST"
            if [[ ! -s "$FILE_LIST" ]]; then
              echo "No C/C++ files to format-check." > "$LOG_FILE"
            else
              xargs -0 clang-format --Werror --dry-run < "$FILE_LIST" > "$LOG_FILE" 2>&1
            fi
          ' || format_exit=$?

          echo "format_exit=$format_exit" >> "$GITHUB_OUTPUT"

      - name: Collect format summary
        id: collect
        if: always()
        run: |
          set -euo pipefail

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/format"
          LOG_FILE="$JOB_LOG_DIR/format_check.log"
          SUMMARY_FILE="$RUNNER_TEMP/format.md"
          STATUS="success"
          JOB_RESULT="success (non-blocking)"

          if [[ "${{ steps.run_check.outputs.format_exit }}" != "0" ]]; then
            STATUS="failure"
            echo "::warning::Format check failed. This job remains non-blocking."
          fi

          {
            echo "## Format Check"
            echo
            echo "- Job result: $JOB_RESULT"
            echo "- Format check result: $STATUS"
            echo "- Non-blocking: yes"
            echo "- Log file: $LOG_FILE"
            echo
            echo '```text'
            if [[ -f "$LOG_FILE" ]]; then
              tail -50 "$LOG_FILE" || true
            else
              echo "format log not found"
            fi
            echo '```'
          } | tee "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload format artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-format
          path: ${{ steps.collect.outputs.summary_file }}
          if-no-files-found: error
          retention-days: 7

  build_current:
    name: Build Current
    needs: prepare_metadata
    runs-on: [self-hosted, musa-gpu]
    outputs:
      status: ${{ steps.collect.outputs.status }}
      summary_file: ${{ steps.collect.outputs.summary_file }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare_metadata.outputs.commit_id }}

      - name: Build current plugin
        id: run_build
        run: |
          set +e

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/build-current"
          LOG_FILE="$JOB_LOG_DIR/build_current.log"
          mkdir -p "$JOB_LOG_DIR"

          build_exit=0
          export LOG_FILE
          bash -l -c '
            export CPLUS_INCLUDE_PATH="/usr/include/c++/11:/usr/include/x86_64-linux-gnu/c++/11:${CPLUS_INCLUDE_PATH:-}"
            cd "$GITHUB_WORKSPACE"
            rm -rf ./build
            ./build.sh > "$LOG_FILE" 2>&1
          ' || build_exit=$?

          echo "build_exit=$build_exit" >> "$GITHUB_OUTPUT"

      - name: Collect build summary
        id: collect
        if: always()
        run: |
          set -euo pipefail

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/build-current"
          LOG_FILE="$JOB_LOG_DIR/build_current.log"
          SUMMARY_FILE="$RUNNER_TEMP/build-current.md"
          PLUGIN_PATH="$GITHUB_WORKSPACE/build/libmusa_plugin.so"
          STATUS="success"

          if [[ "${{ steps.run_build.outputs.build_exit }}" != "0" || ! -f "$PLUGIN_PATH" ]]; then
            STATUS="failure"
          fi

          PLUGIN_SIZE="$(stat -c%s "$PLUGIN_PATH" 2>/dev/null || echo "n/a")"

          {
            echo "## Build Current"
            echo
            echo "- Status: $STATUS"
            echo "- Plugin path: $PLUGIN_PATH"
            echo "- Plugin size: $PLUGIN_SIZE"
            echo "- Log file: $LOG_FILE"
            echo
            echo '```text'
            if [[ -f "$LOG_FILE" ]]; then
              tail -50 "$LOG_FILE" || true
            else
              echo "build log not found"
            fi
            echo '```'
          } | tee "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload current plugin artifact
        if: steps.collect.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CURRENT_PLUGIN_ARTIFACT }}
          path: ${{ github.workspace }}/build/libmusa_plugin.so
          if-no-files-found: error
          retention-days: 7

      - name: Upload build summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-build-current
          path: ${{ steps.collect.outputs.summary_file }}
          if-no-files-found: error
          retention-days: 7

      - name: Fail job if build failed
        if: always() && steps.collect.outputs.status == 'failure'
        run: exit 1

  integration:
    name: Integration Test
    needs: [prepare_metadata, build_current]
    if: needs.build_current.result == 'success'
    runs-on: [self-hosted, musa-gpu]
    outputs:
      status: ${{ steps.collect.outputs.status }}
      summary_file: ${{ steps.collect.outputs.summary_file }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare_metadata.outputs.commit_id }}

      - name: Download current plugin
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.CURRENT_PLUGIN_ARTIFACT }}
          path: ${{ github.workspace }}/build

      - name: Run integration tests
        id: run_test
        run: |
          set +e

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/integration"
          LOG_FILE="$JOB_LOG_DIR/integration_fusion_tests.log"
          mkdir -p "$JOB_LOG_DIR"

          test_exit=0
          export LOG_FILE
          bash -l -c '
            cd "$GITHUB_WORKSPACE/test"
            timeout 30m python test_runner.py --fusion > "$LOG_FILE" 2>&1
          ' || test_exit=$?

          echo "test_exit=$test_exit" >> "$GITHUB_OUTPUT"

      - name: Collect integration summary
        id: collect
        if: always()
        run: |
          set -euo pipefail

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/integration"
          LOG_FILE="$JOB_LOG_DIR/integration_fusion_tests.log"
          SUMMARY_FILE="$RUNNER_TEMP/integration.md"
          STATUS="success"

          if [[ "${{ steps.run_test.outputs.test_exit }}" != "0" ]]; then
            STATUS="failure"
          fi

          {
            echo "## Integration Test"
            echo
            echo "- Status: $STATUS"
            echo "- Log file: $LOG_FILE"
            echo
            echo '```text'
            if [[ -f "$LOG_FILE" ]]; then
              grep -E "Total Tests|Passed|Failed|Errors|Skipped|Pass Rate|Execution Time" "$LOG_FILE" || tail -80 "$LOG_FILE" || true
            else
              echo "integration log not found"
            fi
            echo '```'
          } | tee "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload integration summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-integration
          path: ${{ steps.collect.outputs.summary_file }}
          if-no-files-found: error
          retention-days: 7

      - name: Fail job if integration failed
        if: always() && steps.collect.outputs.status == 'failure'
        run: exit 1

  build_baseline:
    name: Build Baseline
    needs: prepare_metadata
    runs-on: [self-hosted, musa-gpu]
    outputs:
      status: ${{ steps.collect.outputs.status }}
      baseline_sha: ${{ steps.collect.outputs.baseline_sha }}
      summary_file: ${{ steps.collect.outputs.summary_file }}
    steps:
      - name: Sync and build baseline
        id: run_build
        run: |
          set +e

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/build-baseline"
          LOG_FILE="$JOB_LOG_DIR/build_baseline.log"
          mkdir -p "$JOB_LOG_DIR"

          sync_exit=0
          build_exit=0
          baseline_sha=""

          export LOG_FILE BASELINE_WORKSPACE BASELINE_REPO_URL
          bash -l -c '
            BASELINE_PARENT=$(dirname "$BASELINE_WORKSPACE")
            mkdir -p "$BASELINE_PARENT"
            if [[ ! -d "$BASELINE_WORKSPACE/.git" ]]; then
              git clone "$BASELINE_REPO_URL" "$BASELINE_WORKSPACE"
            fi
            cd "$BASELINE_WORKSPACE"
            if git remote get-url upstream >/dev/null 2>&1; then
              git remote set-url upstream "$BASELINE_REPO_URL"
            else
              git remote add upstream "$BASELINE_REPO_URL"
            fi
            git fetch upstream
            if [[ -n "${{ needs.prepare_metadata.outputs.requested_baseline_id }}" ]]; then
              git reset --hard "${{ needs.prepare_metadata.outputs.requested_baseline_id }}"
            else
              git reset --hard upstream/main
            fi
            git clean -fdx
          ' || sync_exit=$?

          if [[ "$sync_exit" == "0" ]]; then
            baseline_sha="$(git -C "$BASELINE_WORKSPACE" rev-parse HEAD 2>/dev/null || true)"
            export LOG_FILE BASELINE_WORKSPACE
            bash -l -c '
              export CPLUS_INCLUDE_PATH="/usr/include/c++/11:/usr/include/x86_64-linux-gnu/c++/11:${CPLUS_INCLUDE_PATH:-}"
              cd "$BASELINE_WORKSPACE"
              rm -rf ./build
              ./build.sh > "$LOG_FILE" 2>&1
            ' || build_exit=$?
          fi

          echo "sync_exit=$sync_exit" >> "$GITHUB_OUTPUT"
          echo "build_exit=$build_exit" >> "$GITHUB_OUTPUT"
          echo "baseline_sha=$baseline_sha" >> "$GITHUB_OUTPUT"

      - name: Collect baseline summary
        id: collect
        if: always()
        run: |
          set -euo pipefail

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/build-baseline"
          LOG_FILE="$JOB_LOG_DIR/build_baseline.log"
          SUMMARY_FILE="$RUNNER_TEMP/build-baseline.md"
          PLUGIN_PATH="$BASELINE_WORKSPACE/build/libmusa_plugin.so"
          STATUS="success"

          if [[ "${{ steps.run_build.outputs.sync_exit }}" != "0" || "${{ steps.run_build.outputs.build_exit }}" != "0" || ! -f "$PLUGIN_PATH" ]]; then
            STATUS="failure"
          fi

          PLUGIN_SIZE="$(stat -c%s "$PLUGIN_PATH" 2>/dev/null || echo "n/a")"
          BASELINE_SHA="${{ steps.run_build.outputs.baseline_sha }}"

          {
            echo "## Build Baseline"
            echo
            echo "- Status: $STATUS"
            echo "- Baseline commit: ${BASELINE_SHA:-unavailable}"
            echo "- Plugin path: $PLUGIN_PATH"
            echo "- Plugin size: $PLUGIN_SIZE"
            echo "- Log file: $LOG_FILE"
            echo
            echo '```text'
            if [[ -f "$LOG_FILE" ]]; then
              tail -50 "$LOG_FILE" || true
            else
              echo "baseline build log not found"
            fi
            echo '```'
          } | tee "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "baseline_sha=${BASELINE_SHA}" >> "$GITHUB_OUTPUT"
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload baseline plugin artifact
        if: steps.collect.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BASELINE_PLUGIN_ARTIFACT }}
          path: ${{ env.BASELINE_WORKSPACE }}/build/libmusa_plugin.so
          if-no-files-found: error
          retention-days: 7

      - name: Upload baseline summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-build-baseline
          path: ${{ steps.collect.outputs.summary_file }}
          if-no-files-found: error
          retention-days: 7

      - name: Fail job if baseline build failed
        if: always() && steps.collect.outputs.status == 'failure'
        run: exit 1

  tencent_perf:
    name: Tencent Performance
    needs: [prepare_metadata, build_current, build_baseline]
    if: needs.build_current.result == 'success' && needs.build_baseline.result == 'success'
    runs-on: [self-hosted, musa-gpu]
    outputs:
      status: ${{ steps.collect.outputs.status }}
      baseline_ms: ${{ steps.collect.outputs.baseline_ms }}
      current_ms: ${{ steps.collect.outputs.current_ms }}
      threshold_ms: ${{ steps.collect.outputs.threshold_ms }}
      summary_file: ${{ steps.collect.outputs.summary_file }}
    steps:
      - name: Download current plugin
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.CURRENT_PLUGIN_ARTIFACT }}
          path: ${{ runner.temp }}/current-plugin

      - name: Download baseline plugin
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BASELINE_PLUGIN_ARTIFACT }}
          path: ${{ runner.temp }}/baseline-plugin

      - name: Run Tencent performance baseline/current
        id: run_perf
        run: |
          set +e

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/tencent-perf"
          BASELINE_LOG="$JOB_LOG_DIR/tencent_perf_baseline.log"
          CURRENT_LOG="$JOB_LOG_DIR/tencent_perf_current.log"
          BASELINE_PLUGIN="$RUNNER_TEMP/baseline-plugin/libmusa_plugin.so"
          CURRENT_PLUGIN="$RUNNER_TEMP/current-plugin/libmusa_plugin.so"
          mkdir -p "$JOB_LOG_DIR"

          baseline_exit=0
          current_exit=0

          export MODEL_ROOT JOB_LOG_DIR BASELINE_LOG CURRENT_LOG BASELINE_PLUGIN CURRENT_PLUGIN

          bash -l -c '
            cd "$MODEL_ROOT/inference/prunedGraph" &&
            timeout 20m python run_inference.py \
              --device musa \
              --musa-plugin "$BASELINE_PLUGIN" \
              --infer-iters 1000 > "$BASELINE_LOG" 2>&1
          ' || baseline_exit=$?

          bash -l -c '
            cd "$MODEL_ROOT/inference/prunedGraph" &&
            timeout 20m python run_inference.py \
              --device musa \
              --musa-plugin "$CURRENT_PLUGIN" \
              --infer-iters 1000 > "$CURRENT_LOG" 2>&1
          ' || current_exit=$?

          echo "baseline_exit=$baseline_exit" >> "$GITHUB_OUTPUT"
          echo "current_exit=$current_exit" >> "$GITHUB_OUTPUT"

      - name: Collect Tencent performance summary
        id: collect
        if: always()
        run: |
          set -euo pipefail

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/tencent-perf"
          BASELINE_LOG="$JOB_LOG_DIR/tencent_perf_baseline.log"
          CURRENT_LOG="$JOB_LOG_DIR/tencent_perf_current.log"
          SUMMARY_FILE="$RUNNER_TEMP/tencent-perf.md"
          STATUS="success"
          BASELINE_MS=""
          CURRENT_MS=""
          THRESHOLD_MS=""

          if [[ "${{ steps.run_perf.outputs.baseline_exit }}" == "0" && -f "$BASELINE_LOG" ]]; then
            BASELINE_MS="$(python3 -c 'import pathlib,re,sys; text=pathlib.Path(sys.argv[1]).read_text(encoding="utf-8", errors="ignore"); matches=re.findall(r"平均:\s*([0-9]+(?:\.[0-9]+)?)\s*ms", text); print(matches[-1] if matches else "")' "$BASELINE_LOG" || true)"
          fi
          if [[ "${{ steps.run_perf.outputs.current_exit }}" == "0" && -f "$CURRENT_LOG" ]]; then
            CURRENT_MS="$(python3 -c 'import pathlib,re,sys; text=pathlib.Path(sys.argv[1]).read_text(encoding="utf-8", errors="ignore"); matches=re.findall(r"平均:\s*([0-9]+(?:\.[0-9]+)?)\s*ms", text); print(matches[-1] if matches else "")' "$CURRENT_LOG" || true)"
          fi

          if [[ "${{ steps.run_perf.outputs.baseline_exit }}" != "0" || "${{ steps.run_perf.outputs.current_exit }}" != "0" || -z "$BASELINE_MS" || -z "$CURRENT_MS" ]]; then
            STATUS="failure"
          else
            THRESHOLD_MS="$(awk -v base="$BASELINE_MS" 'BEGIN {printf "%.4f", base * 1.05}')"
            if awk -v cur="$CURRENT_MS" -v thr="$THRESHOLD_MS" 'BEGIN {exit !(cur > thr)}'; then
              STATUS="failure"
            fi
          fi

          {
            echo "## Tencent Performance"
            echo
            echo "- Status: $STATUS"
            echo "- Baseline commit: ${{ needs.build_baseline.outputs.baseline_sha }}"
            echo "- Baseline: ${BASELINE_MS:-n/a} ms"
            echo "- Current: ${CURRENT_MS:-n/a} ms"
            echo "- Threshold: ${THRESHOLD_MS:-n/a} ms"
            echo
            echo "### Baseline log tail"
            echo '```text'
            if [[ -f "$BASELINE_LOG" ]]; then
              tail -20 "$BASELINE_LOG" || true
            else
              echo "baseline log not found"
            fi
            echo '```'
            echo
            echo "### Current log tail"
            echo '```text'
            if [[ -f "$CURRENT_LOG" ]]; then
              tail -20 "$CURRENT_LOG" || true
            else
              echo "current log not found"
            fi
            echo '```'
          } | tee "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "baseline_ms=$BASELINE_MS" >> "$GITHUB_OUTPUT"
          echo "current_ms=$CURRENT_MS" >> "$GITHUB_OUTPUT"
          echo "threshold_ms=$THRESHOLD_MS" >> "$GITHUB_OUTPUT"
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload Tencent performance summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-tencent-perf
          path: ${{ steps.collect.outputs.summary_file }}
          if-no-files-found: error
          retention-days: 7

      - name: Fail job if Tencent performance regressed
        if: always() && steps.collect.outputs.status == 'failure'
        run: exit 1

  tencent_accuracy:
    name: Tencent Accuracy
    needs: [prepare_metadata, build_current]
    if: needs.build_current.result == 'success'
    runs-on: [self-hosted, musa-gpu]
    outputs:
      status: ${{ steps.collect.outputs.status }}
      current_acc: ${{ steps.collect.outputs.current_acc }}
      summary_file: ${{ steps.collect.outputs.summary_file }}
    steps:
      - name: Download current plugin
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.CURRENT_PLUGIN_ARTIFACT }}
          path: ${{ runner.temp }}/current-plugin

      - name: Run Tencent accuracy current only
        id: run_acc
        run: |
          set +e

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/tencent-accuracy"
          CURRENT_LOG="$JOB_LOG_DIR/tencent_accuracy_current.log"
          CURRENT_PLUGIN="$RUNNER_TEMP/current-plugin/libmusa_plugin.so"
          mkdir -p "$JOB_LOG_DIR"

          current_exit=0

          export MODEL_ROOT JOB_LOG_DIR CURRENT_LOG CURRENT_PLUGIN

          bash -l -c '
            cd "$MODEL_ROOT/inference/prunedGraph" &&
            timeout 20m python run_inference.py \
              --device musa \
              --musa-plugin "$CURRENT_PLUGIN" \
              --check-acc \
              --rtol 1e-2 \
              --atol 1e-2 > "$CURRENT_LOG" 2>&1
          ' || current_exit=$?

          echo "current_exit=$current_exit" >> "$GITHUB_OUTPUT"

      - name: Collect Tencent accuracy summary
        id: collect
        if: always()
        run: |
          set -euo pipefail

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/tencent-accuracy"
          CURRENT_LOG="$JOB_LOG_DIR/tencent_accuracy_current.log"
